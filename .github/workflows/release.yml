name: Release APK

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true
        default: '0.1.0'

env:
  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
  STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Formato de versión inválido: '$VERSION'. Se espera MAYOR.MENOR.PARCHE"
            exit 1
          fi

          echo "name=$VERSION" >> $GITHUB_OUTPUT

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Releasing $VERSION (code $VERSION_CODE)"

      - name: Create and push tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.version.outputs.name }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG ya existe, omitiendo creación."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decode keystore
        run: printf '%s' "$KEYSTORE_B64" | base64 --decode > "$GITHUB_WORKSPACE/release.jks"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/safegap-v${{ steps.version.outputs.name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: "Safegap v${{ steps.version.outputs.name }}"
          body: |
            ## Safegap v${{ steps.version.outputs.name }}

            ### Instalación
            Descarga e instala el APK en tu dispositivo Android (mínimo Android 8.0 / API 26).

            > Habilita **"Instalar de fuentes desconocidas"** en los ajustes de tu dispositivo.
          files: app/build/outputs/apk/release/safegap-v${{ steps.version.outputs.name }}.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove keystore
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/release.jks"
